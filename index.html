<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全景展厅</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
        #panorama{ width:100%; height:100%; }
    </style>
</head>
<body>
    <div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
    "default": "scene1",
    "autoLoad": true,
    "showControls": true,
    "compass": true,
    "scenes": {
        "scene1": {
            "title": "一号展厅",
            "type": "equirectangular",
            "panorama": "scene1.jpg",
            "hotSpots": [
                {
                    "pitch": -5,
                    "yaw": 120,
                    "type": "scene",
                    "text": "去往二号展厅",
                    "sceneId": "scene2"
                }
            ]
        },
        "scene2": {
            "title": "二号展厅",
            "type": "equirectangular",
            "panorama": "scene2.jpg",
            "hotSpots": [
                {
                    "pitch": -5,
                    "yaw": -100,
                    "text": "回到一号展厅",
                    "sceneId": "scene1"
                },
                {
                    "pitch": -5,
                    "yaw": 20,
                    "text": "去往三号展厅",
                    "sceneId": "scene3"
                }
            ]
        },
        "scene3": {
            "title": "三号展厅",
            "type": "equirectangular",
            "panorama": "scene3.jpg",
            "hotSpots": [
                {
                    "pitch": -5,
                    "yaw": -60,
                    "text": "回到二号展厅",
                    "sceneId": "scene2"
                }
            ]
        }
    }
});
</script>
</body>
</html>
