<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展厅VR漫游</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama {width: 100vw; height: 100vh; margin: 0; padding: 0;}
    </style>
</head>
<body>
<div id="panorama"></div>
<script>
pannellum.viewer('panorama', {
    "autoLoad": true,
    "sceneFadeDuration": 1000, // 平滑过渡时间，和如视的步进感一致
    "scenes": {
        "scene1": {
            "title": "展厅入口",
            "panorama": "你的入口全景图.jpg", // 替换成你的图片路径
            "hotSpots": [
                {
                    "pitch": 0,
                    "yaw": 90,
                    "type": "scene",
                    "text": "进入主展厅",
                    "sceneId": "scene2"
                }
            ]
        },
        "scene2": {
            "title": "主展厅",
            "panorama": "你的主展厅全景图.jpg", // 替换成你的图片路径
            "hotSpots": [
                {
                    "pitch": 0,
                    "yaw": -90,
                    "type": "scene",
                    "text": "返回入口",
                    "sceneId": "scene1"
                },
                {
                    "pitch": 0,
                    "yaw": 0,
                    "type": "scene",
                    "text": "进入侧厅",
                    "sceneId": "scene3"
                }
            ]
        },
        "scene3": {
            "title": "侧厅",
            "panorama": "你的侧厅全景图.jpg", // 替换成你的图片路径
            "hotSpots": [
                {
                    "pitch": 0,
                    "yaw": 180,
                    "type": "scene",
                    "text": "返回主展厅",
                    "sceneId": "scene2"
                }
            ]
        }
    }
});
</script>
</body>
</html>
